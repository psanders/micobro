# Minimal smoke flow: a clean install boots to PIN onboarding (no PIN set yet).
# APP_ID must be passed explicitly (-e APP_ID=com.micobro.app on Android).
#
# Dev-client builds only: clearState also wipes the saved Metro server, so the
# JS app never loads on its own. Pass the dev-client deep link to reconnect:
#   adb reverse tcp:8081 tcp:8081
#   maestro test .maestro -e APP_ID=com.micobro.app \
#     -e DEV_URL="micobro://expo-development-client/?url=http%3A%2F%2Flocalhost%3A8081"
# The extra steps wait for the dev launcher, deep-link into Metro, and dismiss
# the first-run dev menu (back key — tapping "Continue" opens the full menu).
# Release builds embed the bundle: omit DEV_URL and the branch is skipped.
appId: ${APP_ID}
---
- launchApp:
    clearState: true
- runFlow:
    when:
      true: ${DEV_URL}
    commands:
      - extendedWaitUntil:
          visible: "Development Build"
          timeout: 20000
      - openLink: ${DEV_URL}
      - extendedWaitUntil:
          visible: "Continue"
          timeout: 45000
      - back
- extendedWaitUntil:
    visible: "Crea tu PIN"
    timeout: 30000
