name: Release Android APK

# Manual, on-demand release: you pick the version, the workflow verifies the
# build is green, builds a release APK, then bumps package.json, tags, and
# publishes a GitHub Release with the APK attached — one link to download.
#
# Nothing is committed, tagged, or pushed until the build itself succeeds, so
# a broken build never leaves a half-finished release behind.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. 0.2.0 (no leading v)"
        required: true

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
      EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID }}

    steps:
      - name: Validate version format
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be X.Y.Z (got '${{ inputs.version }}')"
            exit 1
          fi

      - name: Check tag doesn't already exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git ls-remote --tags "https://github.com/${{ github.repository }}" "refs/tags/v${{ inputs.version }}" | grep -q .; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Keyed on package.json + app.config.ts because expo prebuild generates
      # build.gradle from those — we can't hash generated files that don't exist yet.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('package.json', 'app.config.ts', 'package-lock.json') }}
          restore-keys: gradle-

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('package.json', 'package-lock.json') }}
          restore-keys: m2-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      # Bumps package.json in the working tree only — nothing committed yet.
      # app.config.ts reads its `version` from package.json, so the built APK
      # picks this up automatically once prebuild runs below.
      - name: Bump version (working tree only)
        run: npm version ${{ inputs.version }} --no-git-tag-version --allow-same-version

      # --clean removes any stale android/ directory before regenerating.
      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      # The Expo template defaults to -Xmx2048m -XX:MaxMetaspaceSize=512m,
      # which reliably OOMs on the expo-updates Kotlin/KSP compile step on a
      # standard ubuntu-latest runner (16 GB). gradle.properties is generated
      # by prebuild, so the bump lives here, not in the repo.
      - name: Raise Gradle JVM memory
        working-directory: android
        run: |
          sed -i 's/^org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=1g/' gradle.properties

      # assembleRelease bundles the JS into the APK so it runs standalone (no
      # Metro server needed). Expo's prebuild template signs release builds
      # with its own checked-in debug keystore (same static file every
      # prebuild, on every machine) — good enough for direct-install/personal
      # distribution, and it means every release is signed identically, so
      # installing a newer release over an older one never hits Android's
      # "signatures don't match" error. This is not suitable for Play Store
      # distribution, which needs a real upload key.
      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/micobro-v${{ inputs.version }}-android.apk"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Only reached once the build above has actually succeeded.
      - name: Commit version bump, tag, and push
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release and attach APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" "dist/micobro-v${{ inputs.version }}-android.apk" \
            --title "Micobro v${{ inputs.version }}" \
            --generate-notes

      # 30-day fallback in case the Release step above needs to be redone.
      - name: Upload APK as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: micobro-v${{ inputs.version }}-android
          path: dist/micobro-v${{ inputs.version }}-android.apk
          retention-days: 30

      - name: Add download link to job summary
        run: |
          {
            echo "### 📦 Micobro v${{ inputs.version }} — Android APK"
            echo "- [Download the APK](${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ inputs.version }})"
          } >> "$GITHUB_STEP_SUMMARY"
